<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lina & Fedi Wedding Invitation Pages</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="gallery-body">

  <main class="gallery">

    <!-- PAGE 2 -->
    <section class="image-container page-card">
      <img
        src="images/page2.png"
        alt="Wedding welcome page"
        class="invitation-image"
      />
    </section>

    <!-- PAGE 3 - CHURCH -->
    <section class="image-container page-card">
      <img
        src="images/page3.png"
        alt="Wedding ceremony page"
        class="invitation-image"
      />

      <a
        href="https://maps.app.goo.gl/pijSXCRr31NXPTo37?g_st=ic"
        target="_blank"
        rel="noopener noreferrer"
        class="map-link church-map"
        aria-label="View Saint Hripsime Church on map">
      </a>
    </section>

    <!-- PAGE 4 - RESTAURANT -->
    <section class="image-container page-card">
      <img
        src="images/page4.png"
        alt="Wedding reception page"
        class="invitation-image"
      />

      <a
        href="https://maps.app.goo.gl/qDhPd2dfKMx9R3VH9?g_st=ic"
        target="_blank"
        rel="noopener noreferrer"
        class="map-link restaurant-map"
        aria-label="View Florence Terrace Restaurant on map">
      </a>
    </section>

    <!-- PAGE 5 -->
    <section class="image-container page-card">
      <img
        src="images/page5.png"
        alt="Wedding schedule page"
        class="invitation-image"
      />
    </section>

    <!-- PAGE 6 - RSVP -->
    <section class="image-container page-card page-six-container">
      <img
        src="images/page6.png"
        alt="Dress code and RSVP page"
        class="invitation-image"
      />

      <form
        class="rsvp-form"
        id="rsvpForm"
        action="https://api.web3forms.com/submit"
        method="POST">

        <input type="hidden" name="access_key" value="b449ca7d-b9e2-41a8-8416-8d75da561d3b">
        <input type="hidden" name="subject" value="Wedding RSVP - Lina & Fedi">
        <input type="hidden" name="from_name" value="Lina & Fedi Wedding Invitation">

        <input type="checkbox" name="botcheck" class="hidden-check">

        <input
          type="text"
          name="Name"
          class="rsvp-input name-input"
          required
        />

        <input
          type="text"
          name="Surname"
          class="rsvp-input surname-input"
          required
        />

        <input
          type="number"
          name="Number Attending"
          class="rsvp-input attending-input"
          min="1"
          required
        />

        <label class="rsvp-radio accept-area">
          <input
            type="radio"
            name="Response"
            value="Accepts with pleasure"
            required
          />
          <span class="radio-mark"></span>
        </label>

        <label class="rsvp-radio decline-area">
          <input
            type="radio"
            name="Response"
            value="Declines with regret"
          />
          <span class="radio-mark"></span>
        </label>

        <button type="submit" class="submit-rsvp">
          Send RSVP
        </button>

        <p id="formMessage" class="form-message"></p>

      </form>
    </section>

  </main>

  <script>
    /* Page changing effect */
    const pageCards = document.querySelectorAll(".page-card");

    const observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("page-visible");
        } else {
          entry.target.classList.remove("page-visible");
        }
      });
    }, {
      threshold: 0.25
    });

    pageCards.forEach(function(card) {
      observer.observe(card);
    });

    /* RSVP direct send */
    const form = document.getElementById("rsvpForm");
    const submitBtn = form.querySelector('button[type="submit"]');
    const formMessage = document.getElementById("formMessage");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const formData = new FormData(form);
      const originalText = submitBtn.textContent;

      submitBtn.textContent = "Sending...";
      submitBtn.disabled = true;
      formMessage.textContent = "";

      try {
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          formMessage.textContent = "Thank you! Your RSVP has been sent.";
          form.reset();
        } else {
          formMessage.textContent = "Error: " + data.message;
        }

      } catch (error) {
        formMessage.textContent = "Something went wrong. Please try again.";
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
