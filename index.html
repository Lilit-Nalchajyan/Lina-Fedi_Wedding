<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lina & Fedi Wedding Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="single-page">
    <div class="image-container cover-container">

      <img
        src="images/page1.png"
        alt="Lina and Fedi Wedding Invitation Cover"
        class="invitation-image"
      />

      <a
        href="gallery.html"
        class="stamp-link"
        id="stampLink"
        aria-label="Open wedding invitation">
      </a>

      <div class="open-effect" id="openEffect">
        Opening invitation...
      </div>

    </div>
  </main>

  <audio id="weddingMusic" loop preload="auto">
    <source src="music/Pino%20d%27Angio%27%20-%20Ma%20Quale%20Idea.mp3" type="audio/mpeg">
  </audio>

  <button id="muteButton" class="mute-button">
    Mute Music
  </button>

  <iframe
    src=""
    id="galleryFrame"
    class="gallery-frame"
    title="Wedding invitation pages">
  </iframe>

  <script>
    const stampLink = document.getElementById("stampLink");
    const openEffect = document.getElementById("openEffect");
    const galleryFrame = document.getElementById("galleryFrame");
    const weddingMusic = document.getElementById("weddingMusic");
    const muteButton = document.getElementById("muteButton");

    stampLink.addEventListener("click", async function(event) {
      event.preventDefault();

      weddingMusic.volume = 0.8;
      weddingMusic.muted = false;

      try {
        await weddingMusic.play();
      } catch (error) {
        console.log("Music could not start:", error);
      }

      document.body.classList.add("stamp-clicked");
      openEffect.classList.add("show");

      /*
        Important:
        The gallery loads AFTER the stamp effect.
        This makes page 2 animation visible on mobile.
      */
      setTimeout(function() {
        document.body.classList.add("show-gallery");
        muteButton.classList.add("show");

        setTimeout(function() {
          galleryFrame.src = "gallery.html";
        }, 120);

      }, 900);
    });

    muteButton.addEventListener("click", function() {
      weddingMusic.muted = !weddingMusic.muted;
      muteButton.textContent = weddingMusic.muted ? "Unmute Music" : "Mute Music";
    });
  </script>

</body>
</html>
